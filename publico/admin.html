<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin</title>

<style>

/* ===== RESET ===== */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, Helvetica, sans-serif;
}

/* ===== FONDO ===== */
body {
  background: linear-gradient(135deg, #0f3d2e, #1f7a63, #38b48b);
  min-height: 100vh;
  padding: 20px;
}

/* ===== LOGIN OVERLAY ===== */
#loginBox {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

.login-card {
  background: white;
  padding: 30px;
  border-radius: 15px;
  text-align: center;
  width: 300px;
}

.login-card input {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
}

.login-card button {
  width: 100%;
  padding: 10px;
  background: #1f7a63;
  color: white;
  border: none;
}

/* ===== CONTENEDOR ===== */
.container {
  background: rgba(255,255,255,0.95);
  padding: 20px;
  border-radius: 20px;
  max-width: 1100px;
  margin: auto;
  box-shadow: 0px 10px 30px rgba(0,0,0,0.3);
  display: none; /* 🔐 OCULTO HASTA LOGIN */
}

/* ===== TITULO ===== */
h1 {
  text-align: center;
  color: #0f3d2e;
  margin-bottom: 20px;
}

/* ===== FILTROS ===== */
.filters {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 15px;
}

select, input {
  padding: 10px;
  border-radius: 10px;
  border: 1px solid #ccc;
  flex: 1;
}

/* ===== BOTONES (TU DISEÑO ORIGINAL) ===== */
button {
  padding: 10px 15px;
  border: none;
  border-radius: 10px;
  background: linear-gradient(135deg, #1f7a63, #38b48b);
  color: white;
  cursor: pointer;
}

button:hover {
  transform: scale(1.05);
}

/* ===== TABLA ===== */
table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 10px;
  background: white;
  border-radius: 10px;
  overflow: hidden;
}

th {
  background: #1f7a63;
  color: white;
  padding: 10px;
}

td {
  padding: 10px;
  border-bottom: 1px solid #eee;
  text-align: center;
}

/* ===== MODAL ===== */
#formulario {
  display: none;
}

</style>
</head>

<body>

<!-- 🔐 LOGIN -->
<div id="loginBox">
  <div class="login-card">
    <h3>🔐 Acceso Admin</h3>
    <input type="password" id="pass" placeholder="Contraseña">
    <button onclick="login()">Ingresar</button>
    <p id="msg"></p>
  </div>
</div>

<!-- ADMIN -->
<div class="container">

<h1>Panel Admin</h1>

<div class="filters">

<select id="edificio"></select>
<input id="cedula" placeholder="Cédula">

<button onclick="cargar()">Filtrar</button>
<button onclick="exportarExcel()">Excel</button>
<button onclick="generarReporte()">Reporte</button>

<button onclick="mostrarFormulario()">➕ Persona</button>
<button onclick="mostrarFormEdificio()">🏢 Edificio</button>

</div>

<table>
<thead>
<tr>
<th>ID</th>
<th>Nombre</th>
<th>Cédula</th>
<th>Edificio</th>
<th>Rol</th>
<th>Tipo</th>
<th>Fecha</th>
</tr>
</thead>

<tbody id="tabla"></tbody>
</table>

</div>

<script>

/* ======================
   🔐 SEGURIDAD
====================== */

const PASSWORD = "Habitat2026";
const EXPIRATION_TIME = 4 * 60 * 60 * 1000; // 4 horas

function login(){

  const pass = document.getElementById("pass").value;

  if(pass !== PASSWORD){
    document.getElementById("msg").innerText = "❌ Contraseña incorrecta";
    return;
  }

  localStorage.setItem("auth", pass);
  localStorage.setItem("auth_time", Date.now());

  iniciarAdmin();
}

function checkAuth(){

  const auth = localStorage.getItem("auth");
  const time = localStorage.getItem("auth_time");

  if(!auth || !time) return false;

  if(Date.now() - parseInt(time) > EXPIRATION_TIME){
    localStorage.clear();
    return false;
  }

  return true;
}

function iniciarAdmin(){

  document.getElementById("loginBox").style.display = "none";
  document.querySelector(".container").style.display = "block";

  // 🔥 IMPORTANTE: NO TOCAR TU SISTEMA ORIGINAL
  loadEdificios();
  cargar();
}

/* ======================
   🔥 TU CÓDIGO ORIGINAL
====================== */

async function loadEdificios(){

  const res = await fetch("/admin/edificios", {
    headers: { "Authorization": localStorage.getItem("auth") }
  });

  const data = await res.json();

  const sel = document.getElementById("edificio");
  sel.innerHTML = "<option value=''>Todos</option>";

  data.forEach(e=>{
    sel.innerHTML += `<option value="${e.id}">${e.nombre}</option>`;
  });
}

async function cargar(){

  let e = document.getElementById("edificio").value;
  let c = document.getElementById("cedula").value;

  let url = "/admin/registros?";

  if(e) url += "edificio_id="+e+"&";
  if(c) url += "cedula="+c;

  const res = await fetch(url, {
    headers: { "Authorization": localStorage.getItem("auth") }
  });

  const data = await res.json();

  const t = document.getElementById("tabla");
  t.innerHTML = "";

  data.forEach(r=>{
    const fecha = new Date(r.fecha_hora).toLocaleString("es-CO");

    t.innerHTML += `
      <tr>
        <td>${r.id}</td>
        <td>${r.nombre}</td>
        <td>${r.cedula}</td>
        <td>${r.edificio_nombre || r.edificio}</td>
        <td>${r.rol}</td>
        <td>${r.tipo_registro}</td>
        <td>${fecha}</td>
      </tr>
    `;
  });
}

/* ======================
   INIT
====================== */

if(checkAuth()){
  iniciarAdmin();
}

</script>

</body>
</html>
