<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin</title>

<style>

/* ===== RESET ===== */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, Helvetica, sans-serif;
}

/* ===== FONDO PRO ===== */
body {
  background: linear-gradient(135deg, #0f3d2e, #1f7a63, #38b48b);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: 30px;
  animation: fondoAnim 6s ease-in-out infinite alternate;
}

@keyframes fondoAnim {
  0% { filter: brightness(0.95); }
  100% { filter: brightness(1.05); }
}

/* ===== LOGIN OVERLAY ===== */
#loginBox {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

.login-card {
  background: white;
  padding: 30px;
  border-radius: 18px;
  width: 320px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.3);
  text-align: center;
  animation: aparecer 0.4s ease;
}

.login-card input {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 10px;
  border: 1px solid #ddd;
  outline: none;
}

.login-card button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 10px;
  background: linear-gradient(135deg, #1f7a63, #38b48b);
  color: white;
  cursor: pointer;
}

/* ===== CONTENEDOR ===== */
.container {
  background: rgba(255,255,255,0.95);
  backdrop-filter: blur(10px);
  padding: 25px;
  border-radius: 22px;
  max-width: 1100px;
  width: 100%;
  box-shadow: 0 20px 40px rgba(0,0,0,0.25);
  animation: aparecer 0.5s ease;
  display: none;
}

/* animación */
@keyframes aparecer {
  from { opacity: 0; transform: translateY(15px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ===== TITULO ===== */
h1 {
  text-align: center;
  color: #0f3d2e;
  margin-bottom: 20px;
  font-weight: 600;
}

/* ===== FILTROS ===== */
.filters {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  margin-bottom: 20px;
}

select, input {
  padding: 11px;
  border-radius: 12px;
  border: 1px solid #ddd;
  flex: 1;
  background: #f9f9f9;
  transition: 0.3s;
}

select:focus, input:focus {
  border-color: #1f7a63;
  box-shadow: 0 0 0 3px rgba(31,122,99,0.2);
  background: white;
}

/* ===== BOTONES PRO ===== */
button {
  padding: 11px 16px;
  border: none;
  border-radius: 12px;
  background: linear-gradient(135deg, #1f7a63, #38b48b);
  color: white;
  cursor: pointer;
  transition: 0.25s;
  font-weight: 500;
}

button:hover {
  transform: translateY(-2px) scale(1.02);
  box-shadow: 0 10px 20px rgba(0,0,0,0.25);
}

button:active {
  transform: scale(0.96);
}

/* ===== TABLA PRO ===== */
table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 15px;
  background: white;
  border-radius: 15px;
  overflow: hidden;
}

th {
  background: linear-gradient(135deg, #1f7a63, #2e8f77);
  color: white;
  padding: 12px;
  font-size: 13px;
  text-transform: uppercase;
}

td {
  padding: 12px;
  border-bottom: 1px solid #eee;
  text-align: center;
}

tbody tr:hover {
  background: #ecfbf7;
}

tbody tr:nth-child(even) {
  background: #f7fdfb;
}

/* ===== MODAL ===== */
#formulario {
  display: none;
}

/* ===== MENU PRO (MISMO ESTILO DEL SISTEMA) ===== */
#menuBox {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;

  opacity: 0;
  pointer-events: none;
  transition: 0.3s;
}

#menuBox.show {
  opacity: 1;
  pointer-events: all;
}

.menu-card {
  background: rgba(255,255,255,0.95);
  backdrop-filter: blur(10px);
  padding: 25px;
  border-radius: 22px;
  width: 320px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.25);
  animation: aparecer 0.4s ease;
}

.menu-card h3 {
  color: #0f3d2e;
  margin-bottom: 15px;
}

.menu-card button {
  width: 100%;
  margin: 6px 0;
}

.menu-card{
  background: white;
  padding: 25px;
  border-radius: 20px;
  width: 320px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.3);
  text-align:center;
}

.menu-card h3{
  margin-bottom:15px;
  color:#1f7a63;
}

.menu-card button{
  width:100%;
  margin:6px 0;
}

</style>
</head>

<body>

<!-- 🔐 LOGIN -->
<div id="loginBox">
  <div class="login-card">
    <h3>🔐 Acceso Admin</h3>
    <input type="password" id="pass" placeholder="Contraseña">
    <button onclick="login()">Ingresar</button>
    <p id="msg"></p>
  </div>
</div>

<!-- ADMIN -->
<div class="container">

<h1>Panel Admin</h1>

<div class="filters">

<select id="edificio"></select>
<input id="cedula" placeholder="Cédula">

<button onclick="cargar()">Filtrar</button>
<button onclick="exportarExcel()" style="display:none;">Excel</button>
<button onclick="generarReporte()" style="display:none;">Reporte</button>

<button onclick="mostrarFormulario()" style="display:none;">➕ Persona</button>
<button onclick="mostrarFormEdificio()" style="display:none;">🏢 Edificio</button>
<button onclick="menuAdmin()">☰ Menú</button>

</div>

<table>
<thead>
<tr>
<th>ID</th>
<th>Nombre</th>
<th>Cédula</th>
<th>Edificio</th>
<th>Rol</th>
<th>Tipo</th>
<th>Fecha</th>
<th>Observación</th>
</tr>
</thead>

<tbody id="tabla"></tbody>
</table>

</div>

<script>

/* ======================
   🔐 SEGURIDAD
====================== */

const PASSWORD = "Habitat2026";
const EXPIRATION_TIME = 4 * 60 * 60 * 1000;

function login(){
  const pass = document.getElementById("pass").value;

  if(pass !== PASSWORD){
    document.getElementById("msg").innerText = "❌ Contraseña incorrecta";
    return;
  }

  localStorage.setItem("auth", pass);
  localStorage.setItem("auth_time", Date.now());

  iniciarAdmin();
}

function checkAuth(){
  const auth = localStorage.getItem("auth");
  const time = localStorage.getItem("auth_time");

  if(!auth || !time) return false;

  if(Date.now() - parseInt(time) > EXPIRATION_TIME){
    localStorage.clear();
    return false;
  }

  return true;
}

function iniciarAdmin(){
  document.getElementById("loginBox").style.display = "none";
  document.querySelector(".container").style.display = "block";

  loadEdificios();
  cargar();
  cargarEdificiosFormulario();
}

/* ======================
   EDIFICIOS SELECT FORM
====================== */

async function cargarEdificiosFormulario(){

  const res = await fetch("/admin/edificios", {
    headers: { "Authorization": localStorage.getItem("auth") }
  });

  const data = await res.json();

  const sel = document.getElementById("edificioNuevo");
  if(!sel) return;

  sel.innerHTML = "";

  data.forEach(e=>{
    sel.innerHTML += `<option value="${e.id}">${e.nombre}</option>`;
  });
}

/* ======================
   CARGAR TABLA
====================== */

async function loadEdificios(){

  const res = await fetch("/admin/edificios", {
    headers: { "Authorization": localStorage.getItem("auth") }
  });

  const data = await res.json();

  const sel = document.getElementById("edificio");
  sel.innerHTML = "<option value=''>Todos</option>";

  data.forEach(e=>{
    sel.innerHTML += `<option value="${e.id}">${e.nombre}</option>`;
  });
}

async function cargar(){

  let e = document.getElementById("edificio").value;
  let c = document.getElementById("cedula").value;

  let url = "/admin/registros?";

  if(e) url += "edificio_id="+e+"&";
  if(c) url += "cedula="+c;

  const res = await fetch(url, {
    headers: { "Authorization": localStorage.getItem("auth") }
  });

  const data = await res.json();

  const t = document.getElementById("tabla");
  t.innerHTML = "";

  data.forEach(r=>{
    const fecha = new Date(r.fecha_hora).toLocaleString("es-CO");

    t.innerHTML += `
      <tr>
        <td>${r.id}</td>
        <td>${r.nombre}</td>
        <td>${r.cedula}</td>
        <td>${r.edificio_nombre || r.edificio}</td>
        <td>${r.rol}</td>
        <td>${r.tipo_registro}</td>
        <td>${fecha}</td>
        <td style="color:red;">${r.observacion || "-"}</td>
      </tr>
    `;
  });
}

/* ======================
   PERSONA (FIX REAL)
====================== */

function mostrarFormulario(){
  document.getElementById("formulario").style.display = "flex";
}

function cerrarFormulario(){
  document.getElementById("formulario").style.display = "none";
}

async function crearUsuario(){

  const nombre = document.getElementById("nombreNuevo").value;
  const cedula = document.getElementById("cedulaNueva").value;
  const rol_id = document.getElementById("rolNuevo").value;
  const edificio = document.getElementById("edificioNuevo").value;

  const res = await fetch("/admin/crear-usuario", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": localStorage.getItem("auth")
    },
    body: JSON.stringify({
      nombre,
      cedula,
      rol_id,
      edificios: [edificio]
    })
  });

  const data = await res.json();

  alert(data.mensaje);
  cerrarFormulario();
}

/* ======================
   EDIFICIO
====================== */

function mostrarFormEdificio(){

  const nombre = prompt("Nombre del edificio");
  if(!nombre) return;

  fetch("/admin/agregar-edificio", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": localStorage.getItem("auth")
    },
    body: JSON.stringify({ nombre })
  })
  .then(res => res.json())
  .then(data => {
    alert(data.mensaje);
    loadEdificios();
    cargarEdificiosFormulario();
  });
}

/* ======================
   EXCEL (ARREGLADO 🔥)
====================== */

async function exportarExcel(){

  const mes = new Date().getMonth() + 1;

  const res = await fetch(`/admin/exportar-excel-mensual?mes=${mes}`, {
    headers: {
      "Authorization": localStorage.getItem("auth")
    }
  });

  const blob = await res.blob();
  const url = window.URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "reporte.xlsx";
  a.click();
}

/* ======================
   REPORTE
====================== */

async function generarReporte(){

  const mes = prompt("Mes (1-12)");
  if(!mes) return;

  const res = await fetch(`/admin/exportar-excel-mensual?mes=${mes}`, {
    headers: {
      "Authorization": localStorage.getItem("auth")
    }
  });

  const blob = await res.blob();
  const url = window.URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "reporte.xlsx";
  a.click();
}

/* ======================
   MENÚ (FIX TOTAL 🔥)
====================== */

function menuAdmin(){
  document.getElementById("menuBox").style.display = "flex";
}

function cerrarMenu(){
  document.getElementById("menuBox").style.display = "none";
}

/* ======================
   EDITAR
====================== */

async function editarUsuario(){

  const id = prompt("ID del usuario");
  const nombre = prompt("Nuevo nombre");
  const cedula = prompt("Nueva cédula");
  const rol_id = prompt("Rol (1-4)");

  if(!id) return;

  const res = await fetch("/admin/editar-usuario", {
    method: "PUT",
    headers: {
      "Content-Type": "application/json",
      "Authorization": localStorage.getItem("auth")
    },
    body: JSON.stringify({ id, nombre, cedula, rol_id })
  });

  const data = await res.json();
  alert(data.mensaje);
}

/* ======================
   ELIMINAR
====================== */

async function eliminarRegistro(){

  const id = prompt("ID del registro");
  if(!id) return;

  const res = await fetch(`/admin/eliminar-registro/${id}`, {
    method: "DELETE",
    headers: {
      "Authorization": localStorage.getItem("auth")
    }
  });

  const data = await res.json();

  alert(data.mensaje);
  cargar();
}

/* ======================
   DASHBOARD
====================== */

async function dashboard(){

  const res = await fetch("/admin/dashboard", {
    headers: { "Authorization": localStorage.getItem("auth") }
  });

  const data = await res.json();

  let texto = "📊 REGISTROS POR EDIFICIO\n\n";

  data.forEach(d=>{
    texto += `${d.edificio}: ${d.total}\n`;
  });

  alert(texto);
}

/* ======================
   INIT
====================== */

if(checkAuth()){
  iniciarAdmin();
}

</script>

<div id="menuBox">
  <div class="menu-card">

    <h3>⚙️ Menú Admin</h3>

    <button onclick="mostrarFormulario(); cerrarMenu()">➕ Persona</button>
    <button onclick="mostrarFormEdificio(); cerrarMenu()">🏢 Edificio</button>
    <button onclick="editarUsuario(); cerrarMenu()">✏️ Editar Usuario</button>
    <button onclick="eliminarRegistro(); cerrarMenu()">🗑️ Eliminar Registro</button>
    <button onclick="dashboard(); cerrarMenu()">📊 Dashboard</button>
    <button onclick="exportarExcel(); cerrarMenu()">📥 Excel</button>
    <button onclick="generarReporte(); cerrarMenu()">📄 Reporte</button>

    <button onclick="cerrarMenu()" style="background:#d93025;">Cerrar</button>

  </div>
</div>

<!-- MODAL PERSONA -->
<div id="formulario" style="
position: fixed;
top:0;
left:0;
width:100%;
height:100%;
background: rgba(0,0,0,0.6);
display:none;
justify-content:center;
align-items:center;
z-index:9999;
">

  <div style="
  background:white;
  padding:25px;
  border-radius:15px;
  width:300px;
  ">

    <h3>Crear Usuario</h3>

    <input id="nombreNuevo" placeholder="Nombre" style="width:100%;margin:5px 0;padding:10px;">
    <input id="cedulaNueva" placeholder="Cédula" style="width:100%;margin:5px 0;padding:10px;">
    <input id="rolNuevo" placeholder="Rol ID (1-4)" style="width:100%;margin:5px 0;padding:10px;">

    <select id="edificioNuevo" style="width:100%;margin:5px 0;padding:10px;"></select>

    <button onclick="crearUsuario()">Guardar</button>
    <button onclick="cerrarFormulario()">Cerrar</button>

  </div>
</div>

</body>
</html>
