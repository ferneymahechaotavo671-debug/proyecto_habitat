<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Panel Admin</title>
  <style>
    body {
      font-family: Arial;
      background: #f4f6f9;
      padding: 20px;
      text-align: center;
    }

    h1 {
      margin-bottom: 20px;
    }

    button {
      padding: 10px 20px;
      background: #2ecc71;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 5px;
      margin-bottom: 20px;
    }

    button:hover {
      background: #27ae60;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
    }

    th, td {
      padding: 10px;
      border: 1px solid #ddd;
    }

    th {
      background: #2c3e50;
      color: white;
    }
  </style>
</head>
<body>

  <h1>📋 Registros del Sistema</h1>

  <button onclick="exportarExcel()">📥 Descargar Excel</button>

  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Nombre</th>
        <th>Cédula</th>
        <th>Edificio</th>
        <th>Tipo</th>
        <th>Fecha</th>
      </tr>
    </thead>
    <tbody id="tablaRegistros"></tbody>
  </table>

  <script>
    function cargarRegistros() {
      fetch("/admin/registros")
        .then(res => res.json())
        .then(data => {
          const tabla = document.getElementById("tablaRegistros");
          tabla.innerHTML = "";

          if (data.length === 0) {
            tabla.innerHTML = "<tr><td colspan='6'>No hay registros</td></tr>";
            return;
          }

          data.forEach(r => {
            tabla.innerHTML += `
              <tr>
                <td>${r.id}</td>
                <td>${r.nombre}</td>
                <td>${r.cedula}</td>
                <td>${r.edificio}</td>
                <td>${r.tipo_registro}</td>
                <td>${new Date(r.fecha_hora).toLocaleString("es-CO")}</td>
              </tr>
            `;
          });
        })
        .catch(err => console.error("Error:", err));
    }

    function exportarExcel() {
      window.location.href = "/admin/exportar-excel";
    }

    // Cargar al iniciar
    window.onload = cargarRegistros;

    // Actualizar cada 5 segundos
    setInterval(cargarRegistros, 5000);
  </script>

</body>
</html>
