<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Admin</title>
</head>
<body>

<h1>Panel Admin</h1>

<select id="edificio"></select>
<input id="cedula" placeholder="Cédula">
<button onclick="cargar()">Filtrar</button>
<button onclick="mostrarFormulario()">➕ Agregar Persona</button>

<table border="1">
<thead>
<tr>
<th>ID</th><th>Nombre</th><th>Cédula</th><th>Edificio</th><th>Rol</th><th>Tipo</th><th>Fecha</th>
</tr>
</thead>
<tbody id="tabla"></tbody>
</table>

<!-- 🔥 FORMULARIO -->
<div id="formulario" style="display:none; position:fixed; top:15%; left:35%; background:white; padding:20px; border:1px solid #ccc; z-index:999; width:300px;">

<h3>Agregar Persona</h3>

<input id="nombre" placeholder="Nombre completo" style="width:100%; margin:5px 0;">
<input id="cedulaNuevo" placeholder="Cédula" style="width:100%; margin:5px 0;">

<select id="rol" style="width:100%; margin:5px 0;">
  <option value="1">Administración</option>
  <option value="2">Vigilancia</option>
  <option value="3">Servicios Generales</option>
</select>

<select id="edificioNuevo" multiple style="width:100%; height:120px; margin:5px 0;"></select>

<button onclick="guardarPersona()" style="width:100%; margin-top:10px;">Guardar</button>
<button onclick="cerrarFormulario()" style="width:100%; margin-top:5px;">Cerrar</button>

</div>

<script>

async function loadEdificios(){
  const res = await fetch("/admin/edificios");
  const data = await res.json();

  const sel = document.getElementById("edificio");

  data.forEach(e=>{
    sel.innerHTML += `<option value="${e.id}">${e.nombre}</option>`;
  });
}

async function cargar(){

  let e = document.getElementById("edificio").value;
  let c = document.getElementById("cedula").value;

  let url = "/admin/registros?";

  if(e) url += "edificio_id="+e+"&";
  if(c) url += "cedula="+c;

  const res = await fetch(url);
  const data = await res.json();

  const t = document.getElementById("tabla");
  t.innerHTML = "";

  data.forEach(r=>{
    t.innerHTML += `
      <tr>
        <td>${r.id}</td>
        <td>${r.nombre}</td>
        <td>${r.cedula}</td>
        <td>${r.edificio_nombre}</td>
        <td>${r.rol || "-"}</td>
        <td>${r.tipo_registro}</td>
        <td>${r.fecha_hora}</td>
      </tr>
    `;
  });
}

// 🔥 FORMULARIO CONTROL
function mostrarFormulario(){
  document.getElementById("formulario").style.display = "block";
}

function cerrarFormulario(){
  document.getElementById("formulario").style.display = "none";
}

// 🔥 cargar edificios en formulario
async function cargarEdificiosForm(){
  const res = await fetch("/admin/edificios");
  const data = await res.json();

  const sel = document.getElementById("edificioNuevo");
  sel.innerHTML = "";

  data.forEach(e=>{
    sel.innerHTML += `<option value="${e.id}">${e.nombre}</option>`;
  });
}

// 🔥 guardar usuario
async function guardarPersona(){

  const nombre = document.getElementById("nombre").value.trim();
  const cedula = document.getElementById("cedulaNuevo").value.trim();
  const rol_id = document.getElementById("rol").value;

  const edificios = Array.from(
    document.getElementById("edificioNuevo").selectedOptions
  ).map(o => o.value);

  if(!nombre || !cedula){
    alert("Completa los datos");
    return;
  }

  const res = await fetch("/admin/crear-usuario", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      nombre,
      cedula,
      rol_id,
      edificios
    })
  });

  const data = await res.json();
  alert(data.mensaje);

  cerrarFormulario();
}

// INIT
loadEdificios();
cargar();
cargarEdificiosForm();

</script>

</body>
</html>
