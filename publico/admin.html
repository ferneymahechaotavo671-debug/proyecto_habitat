<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Panel Admin</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #eef2f7;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 10px;
    }

    .contador {
      text-align: center;
      margin-bottom: 20px;
      font-weight: bold;
      color: #2c3e50;
    }

    .botones {
      text-align: center;
      margin-bottom: 15px;
    }

    button {
      padding: 10px 20px;
      margin: 5px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      color: white;
      font-weight: bold;
    }

    .excel { background: #27ae60; }
    .excel:hover { background: #219150; }

    .mensual { background: #2980b9; }
    .mensual:hover { background: #1f6691; }

    .filtros {
      text-align: center;
      margin-bottom: 20px;
    }

    select, input {
      padding: 8px;
      margin: 5px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: 10px;
      overflow: hidden;
    }

    th {
      background: #2c3e50;
      color: white;
      padding: 10px;
    }

    td {
      padding: 10px;
      border-bottom: 1px solid #ddd;
      text-align: center;
    }

    tr:hover {
      background: #f2f2f2;
    }
  </style>
</head>

<body>

<h1>📊 Panel de Administración</h1>

<div class="contador" id="contador">Total registros: 0</div>

<div class="botones">
  <button class="excel" onclick="exportarExcel()">📥 Excel General</button>
  <button class="mensual" onclick="reporteMensual()">📅 Reporte Mensual</button>
</div>

<!-- 🔥 FILTROS -->
<div class="filtros">
  <select id="filtroEdificio">
    <option value="">Todos los edificios</option>
  </select>

  <input type="text" id="filtroCedula" placeholder="Buscar cédula">

  <button onclick="cargarRegistros()">Filtrar</button>
</div>

<table>
  <thead>
    <tr>
      <th>ID</th>
      <th>Nombre</th>
      <th>Cédula</th>
      <th>Edificio</th>
      <th>Tipo</th>
      <th>Fecha</th>
    </tr>
  </thead>
  <tbody id="tablaRegistros"></tbody>
</table>

<script>

function cargarEdificios() {
  fetch("/admin/edificios")
    .then(res => res.json())
    .then(data => {
      const select = document.getElementById("filtroEdificio");

      data.forEach(e => {
        const option = document.createElement("option");
        option.value = e.id;
        option.textContent = e.nombre;
        select.appendChild(option);
      });
    });
}

function cargarRegistros() {
  const edificio = document.getElementById("filtroEdificio").value;
  const cedula = document.getElementById("filtroCedula").value;

  let url = "/admin/registros?";

  if (edificio) url += `edificio_id=${edificio}&`;
  if (cedula) url += `cedula=${cedula}`;

  fetch(url)
    .then(res => res.json())
    .then(data => {
      const tabla = document.getElementById("tablaRegistros");
      const contador = document.getElementById("contador");

      tabla.innerHTML = "";
      contador.innerText = "Total registros: " + data.length;

      if (data.length === 0) {
        tabla.innerHTML = "<tr><td colspan='6'>No hay registros</td></tr>";
        return;
      }

      data.forEach(r => {
        tabla.innerHTML += `
          <tr>
            <td>${r.id}</td>
            <td>${r.nombre}</td>
            <td>${r.cedula}</td>
            <td>${r.edificio_nombre || r.edificio}</td>
            <td>${r.tipo_registro}</td>
            <td>${new Date(r.fecha_hora).toLocaleString("es-CO")}</td>
          </tr>
        `;
      });
    });
}

function exportarExcel() {
  window.location.href = "/admin/exportar-excel";
}

function reporteMensual() {
  const mes = prompt("Ingresa el mes (1-12):");
  if (!mes) return;

  window.location.href = `/admin/exportar-excel-mensual?mes=${mes}`;
}

window.onload = () => {
  cargarEdificios();
  cargarRegistros();
};

setInterval(cargarRegistros, 5000);

</script>

</body>
</html>
