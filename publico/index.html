<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro QR</title>

<style>

/* ===== RESET ===== */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* ===== FUENTE PRO ===== */
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap');

body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #0f3d2e, #1f7a63, #38b48b);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;

    animation: fondoAnim 6s ease-in-out infinite alternate;
}

/* ===== ANIMACIÓN FONDO ===== */
@keyframes fondoAnim {
    0% { filter: brightness(0.95); }
    100% { filter: brightness(1.05); }
}

/* ===== CONTENEDOR ===== */
.container {
    background: rgba(255, 255, 255, 0.93);
    backdrop-filter: blur(12px);
    padding: 35px;
    border-radius: 22px;
    width: 90%;
    max-width: 420px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.25);
    text-align: center;
    animation: aparecer 0.6s ease;
}

/* ===== ANIMACIÓN ===== */
@keyframes aparecer {
    from { opacity: 0; transform: translateY(20px) scale(0.97); }
    to { opacity: 1; transform: translateY(0) scale(1); }
}

/* ===== LOGO ===== */
.logo {
    width: 110px;
    margin-bottom: 15px;
}

/* ===== TITULO ===== */
h1 {
    color: #0f3d2e;
    margin-bottom: 10px;
}

/* ===== SUBTITULO ===== */
h3 {
    color: #1f7a63;
    margin-bottom: 20px;
}

/* ===== FORM ===== */
form {
    display: flex;
    flex-direction: column;
    gap: 15px;
}

/* ===== INPUT ===== */
input {
    padding: 13px;
    border-radius: 12px;
    border: 1px solid #ddd;
    background: #f9f9f9;
}

/* ===== BOTÓN ===== */
button {
    padding: 13px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg, #1f7a63, #38b48b);
    color: white;
    cursor: pointer;
}

/* ===== MENSAJE ===== */
#mensaje {
    margin-top: 15px;
    opacity: 0;
    transition: 0.4s;
}

#mensaje.show {
    opacity: 1;
}

.success { color: #1f7a63; }
.error { color: #d93025; }

#overlayMensaje {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.7);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;

  opacity: 0;
  pointer-events: none;
  transition: 0.4s;
}

#overlayMensaje.show {
  opacity: 1;
  pointer-events: all;
}

.mensaje-box {
  background: white;
  padding: 40px;
  border-radius: 20px;
  text-align: center;
  animation: pop 0.4s ease;
}

.mensaje-box h2 {
  font-size: 28px;
  color: #1f7a63;
}

@keyframes pop {
  from {
    transform: scale(0.8);
    opacity: 0;
  }
  to {
    transform: scale(1);
    opacity: 1;
  }
}

</style>
</head>

<body>

<div class="container">

  <img src="logo.png" class="logo">

  <h1>Registro de Ingreso / Salida</h1>

  <h3 id="edificio">Validando...</h3>

  <form id="form">
    <input type="text" id="cedula" placeholder="Ingrese su cédula" required>
    <button type="submit">Registrar</button>
  </form>

  <p id="mensaje"></p>

</div>

<div id="overlayMensaje">
  <div class="mensaje-box">
    <h2 id="textoGrande"></h2>
  </div>
</div>

<script>

// ==============================
// QR
// ==============================
const params = new URLSearchParams(location.search);
let codigo = params.get("edificio");

if (!codigo) {
  document.body.innerHTML = "<h2>Acceso denegado ❌</h2>";
  throw new Error("Sin QR");
}

codigo = codigo.toLowerCase().trim().replace(/\s+/g,"").replace(/[^a-z0-9]/g,"");

// ==============================
// ⏱ TIEMPO QR (NO TOCADO)
// ==============================
const TIEMPO_LIMITE = 20 * 60 * 1000;

let inicioGuardado = localStorage.getItem("inicioQR");

if (!inicioGuardado) {
  inicioGuardado = Date.now();
  localStorage.setItem("inicioQR", inicioGuardado);
}

const inicio = parseInt(inicioGuardado);

function verificarTiempo() {
  const ahora = Date.now();
  if (ahora - inicio > TIEMPO_LIMITE) {
    localStorage.removeItem("inicioQR");

    document.body.innerHTML = `
      <div style="text-align:center;">
        <h2>⏰ Sesión expirada</h2>
        <p>Debes escanear nuevamente el QR</p>
      </div>
    `;
    return false;
  }
  return true;
}

if (!verificarTiempo()) throw new Error("expirado");

// ==============================
// 🔥 FIX REAL: CARGAR EDIFICIOS
// ==============================
async function cargarNombreEdificio() {
  try {

    const auth = localStorage.getItem("auth"); // 👈 importante

    const res = await fetch("/admin/edificios", {
      headers: {
        "Authorization": auth || ""
      }
    });

    if (!res.ok) throw new Error("error");

    const edificios = await res.json();

    const edificio = edificios.find(e => e.codigo_qr === codigo);

    document.getElementById("edificio").innerText =
      edificio ? edificio.nombre : "Edificio no válido";

  } catch (error) {
    document.getElementById("edificio").innerText = "Error cargando edificio";
  }
}

cargarNombreEdificio();

// pantalla de exito despues de registar

function mostrarMensajeGrande(texto, tipo = "ok") {

  const overlay = document.getElementById("overlayMensaje");
  const textoGrande = document.getElementById("textoGrande");

  textoGrande.innerText = texto;

  if(tipo === "ok"){
    textoGrande.style.color = "#1f7a63";
  } else {
    textoGrande.style.color = "#d93025";
  }

  overlay.classList.add("show");

  setTimeout(() => {
    overlay.classList.remove("show");
  }, 2500);
}

// ==============================
// ENVIAR REGISTRO
// ==============================
document.getElementById("form").onsubmit = async (e) => {
  e.preventDefault();

  if (!verificarTiempo()) return;

  const cedula = document.getElementById("cedula").value.trim();

  const msg = document.getElementById("mensaje");

  msg.classList.remove("show");

  try {

    const res = await fetch("/registro", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        cedula,
        codigoEdificio: codigo
      })
    });

    const data = await res.json();

    msg.innerText = data.mensaje;

    if (data.mensaje && data.mensaje.includes("registrada")) {
  mostrarMensajeGrande(`✅ ${data.mensaje.toUpperCase()}`, "ok");
} else {
  mostrarMensajeGrande("❌ ACCESO DENEGADO", "error");
}

  } catch (err) {
    msg.innerText = "Error de conexión ❌";
    msg.className = "error show";
  }
};

</script>

</body>
</html>
