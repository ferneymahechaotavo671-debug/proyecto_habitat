<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro QR</title>

<style>

/* RESET */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, Helvetica, sans-serif;
}

/* FONDO */
body {
    background: linear-gradient(135deg, #0f3d2e, #1f7a63, #38b48b);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* CONTENEDOR */
.container {
    background: rgba(255, 255, 255, 0.95);
    padding: 30px;
    border-radius: 20px;
    width: 90%;
    max-width: 420px;
    box-shadow: 0px 10px 30px rgba(0,0,0,0.3);
    text-align: center;
}

/* LOGO */
.logo {
    width: 120px;
    margin-bottom: 15px;
}

/* TITULO */
h1 {
    color: #0f3d2e;
    margin-bottom: 20px;
}

/* SUBTITULO */
h3 {
    color: #1f7a63;
    margin-bottom: 15px;
}

/* FORM */
form {
    display: flex;
    flex-direction: column;
    gap: 15px;
}

/* INPUTS */
input {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #ccc;
    outline: none;
    transition: 0.3s;
}

/* EFECTO FOCO */
input:focus {
    border-color: #1f7a63;
    box-shadow: 0 0 8px rgba(31,122,99,0.5);
}

/* BOTÓN */
button {
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(135deg, #1f7a63, #38b48b);
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
    background: linear-gradient(135deg, #38b48b, #1f7a63);
}

/* MENSAJE */
#mensaje {
    margin-top: 15px;
    font-weight: bold;
    opacity: 0;
    transition: opacity 0.5s;
}

#mensaje.show {
    opacity: 1;
}

.success {
    color: #1f7a63;
}

.error {
    color: red;
}

/* RESPONSIVE */
@media (max-width: 480px) {
    .container {
        width: 95%;
        padding: 20px;
    }
}

</style>
</head>

<body>

<div class="container">

  <img src="logo.png" class="logo">

  <h1>Registro de Ingreso / Salida</h1>

  <h3 id="edificio">Validando...</h3>

  <form id="form">
    <input type="text" id="cedula" placeholder="Ingrese su cédula" required>
    <button type="submit">Registrar</button>
  </form>

  <p id="mensaje"></p>

</div>

<script>

// QR
const params = new URLSearchParams(location.search);
let codigo = params.get("edificio");

if (!codigo) {
  document.body.innerHTML = "<h2>Acceso denegado ❌</h2>";
  throw new Error("Sin QR");
}

// NORMALIZAR
codigo = codigo
  .toString()
  .trim()
  .toLowerCase()
  .replace(/\s+/g, "")
  .replace(/\./g, "")
  .replace(/[^a-z0-9]/g, "");

// 🔥 NOMBRES (AQUÍ SOLO AGREGAMOS EL TUYO)
const nombres = {
  arcolsa1: "ED. ARCOLSA 1",
  elpunto: "ED. EL PUNTO",
  calle91: "CALLE 91 PH",
  cerrosales: "ED. CERROSALES",
  balconesemaus: "ED. BALCONES DE EMAUS",
  torreverne: "ED. TORRE VERNE",
  sanjake: "ED. SANJAKE",
  plaza94: "ED. PLAZA 94",
  parque86: "ED. PARQUE 86",
  santorini: "ED. SANTORINI",
  in91: "ED. 91 IN",
  iflat63: "ED. IFLAT 63",
  kubik54: "ED. KUBIK 54",
  lagospontevedra: "ED. LAGOS DE PONTEVEDRA",
  vita106: "ED. VITA 106",
  conquistador: "ED. CONQUISTADOR",
  urapanes: "ED. URAPANES",
  callejonparque: "ED. CALLEJON DEL PARQUE",
  toscana: "ED. TOSCANA",
  altosherradura: "ED. ALTOS DE LA HERRADURA"
};

// MOSTRAR NOMBRE
document.getElementById("edificio").innerText =
  nombres[codigo] || "Edificio no válido";

// ==============================
// ⏱️ TIEMPO
// ==============================
const TIEMPO_LIMITE = 20 * 60 * 1000;

let inicioGuardado = localStorage.getItem("inicioQR");

if (!inicioGuardado) {
  inicioGuardado = Date.now();
  localStorage.setItem("inicioQR", inicioGuardado);
}

const inicio = parseInt(inicioGuardado);

function verificarTiempo() {
  const ahora = Date.now();
  const pasado = ahora - inicio;

  if (pasado > TIEMPO_LIMITE) {

    localStorage.removeItem("inicioQR");

    document.body.innerHTML = `
      <div style="text-align:center; margin-top:50px;">
        <h2>⏰ Sesión expirada</h2>
        <p>Debes escanear nuevamente el QR</p>
      </div>
    `;
    return false;
  }
  return true;
}

if (!verificarTiempo()) {
  throw new Error("QR expirado");
}

// ENVIAR
document.getElementById("form").onsubmit = async (e) => {
  e.preventDefault();

  if (!verificarTiempo()) return;

  const cedula = document.getElementById("cedula").value.trim();
  const msg = document.getElementById("mensaje");

  msg.className = "";
  msg.classList.remove("show");

  try {

    const res = await fetch("/registro", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        cedula,
        codigoEdificio: codigo
      })
    });

    if (!res.ok) {
      throw new Error("Error servidor");
    }

    const data = await res.json();

    msg.innerText = data.mensaje || "Sin respuesta del servidor";

    if (data.mensaje && data.mensaje.includes("registrada")) {
      msg.classList.add("success");
    } else {
      msg.classList.add("error");
    }

  } catch (error) {

    msg.innerText = "Error de conexión ❌";
    msg.classList.add("error");

  }

  msg.classList.add("show");
};

</script>

</body>
</html>
