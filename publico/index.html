<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro QR</title>

<style>

/* ===== RESET ===== */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* ===== FUENTE PRO ===== */
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap');

body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #0f3d2e, #1f7a63, #38b48b);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;

    animation: fondoAnim 6s ease-in-out infinite alternate;
}

/* ===== ANIMACIÓN FONDO ===== */
@keyframes fondoAnim {
    0% { filter: brightness(0.95); }
    100% { filter: brightness(1.05); }
}

/* ===== CONTENEDOR ===== */
.container {
    background: rgba(255, 255, 255, 0.93);
    backdrop-filter: blur(12px);
    padding: 35px;
    border-radius: 22px;
    width: 90%;
    max-width: 420px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.25);
    text-align: center;

    animation: aparecer 0.6s ease;
}

/* animación entrada */
@keyframes aparecer {
    from {
        opacity: 0;
        transform: translateY(20px) scale(0.97);
    }
    to {
        opacity: 1;
        transform: translateY(0) scale(1);
    }
}

/* ===== LOGO ===== */
.logo {
    width: 110px;
    margin-bottom: 15px;
    transition: transform 0.3s ease;
}

.logo:hover {
    transform: scale(1.05);
}

/* ===== TITULO ===== */
h1 {
    color: #0f3d2e;
    margin-bottom: 10px;
    font-weight: 600;
}

/* ===== SUBTITULO ===== */
h3 {
    color: #1f7a63;
    margin-bottom: 20px;
    font-weight: 400;
}

/* ===== FORM ===== */
form {
    display: flex;
    flex-direction: column;
    gap: 15px;
}

/* ===== INPUTS ===== */
input {
    width: 100%;
    padding: 13px;
    border-radius: 12px;
    border: 1px solid #ddd;
    outline: none;
    background: #f9f9f9;
    transition: all 0.3s ease;
    font-size: 14px;
}

/* FOCUS PRO */
input:focus {
    border-color: #1f7a63;
    background: #fff;
    box-shadow: 0 0 0 3px rgba(31,122,99,0.2);
}

/* ===== BOTÓN PRO ===== */
button {
    padding: 13px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg, #1f7a63, #38b48b);
    color: white;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.25s ease;

    display: flex;
    justify-content: center;
    align-items: center;
    gap: 8px;
}

/* HOVER */
button:hover {
    transform: translateY(-2px) scale(1.02);
    box-shadow: 0 10px 20px rgba(0,0,0,0.25);
}

/* CLICK */
button:active {
    transform: scale(0.97);
}

/* ===== MENSAJE ===== */
#mensaje {
    margin-top: 15px;
    font-weight: 500;
    opacity: 0;
    transform: translateY(5px);
    transition: all 0.4s ease;
}

#mensaje.show {
    opacity: 1;
    transform: translateY(0);
}

.success {
    color: #1f7a63;
}

.error {
    color: #d93025;
}

/* ===== DETALLE PRO ===== */
.container::before {
    content: "";
    display: block;
    width: 50px;
    height: 4px;
    background: linear-gradient(135deg, #1f7a63, #38b48b);
    border-radius: 10px;
    margin: 0 auto 15px auto;
}

/* ===== RESPONSIVE ===== */
@media (max-width: 480px) {
    .container {
        width: 95%;
        padding: 25px;
    }
}

</style>
</head>

<body>

<div class="container">

  <img src="logo.png" class="logo">

  <h1>Registro de Ingreso / Salida</h1>

  <h3 id="edificio">Validando...</h3>

  <form id="form">
    <input type="text" id="cedula" placeholder="Ingrese su cédula" required>
    <button type="submit">Registrar</button>
  </form>

  <p id="mensaje"></p>

</div>

<script>

// QR
const params = new URLSearchParams(location.search);
let codigo = params.get("edificio");

if (!codigo) {
  document.body.innerHTML = "<h2>Acceso denegado ❌</h2>";
  throw new Error("Sin QR");
}

// NORMALIZAR
codigo = codigo
  .toString()
  .trim()
  .toLowerCase()
  .replace(/\s+/g, "")
  .replace(/\./g, "")
  .replace(/[^a-z0-9]/g, "");

// 🔥 OBTENER NOMBRE REAL DESDE EL SERVER
async function cargarNombreEdificio() {
  try {

    const res = await fetch("/admin/edificios");
    const edificios = await res.json();

    const edificio = edificios.find(e =>
      e.codigo_qr === codigo
    );

    document.getElementById("edificio").innerText =
      edificio ? edificio.nombre : "Edificio no válido";

  } catch (error) {
    document.getElementById("edificio").innerText = "Error cargando edificio";
  }
}

// ejecutar
cargarNombreEdificio();

// ==============================
// ⏱️ TIEMPO
// ==============================
const TIEMPO_LIMITE = 20 * 60 * 1000;

let inicioGuardado = localStorage.getItem("inicioQR");

if (!inicioGuardado) {
  inicioGuardado = Date.now();
  localStorage.setItem("inicioQR", inicioGuardado);
}

const inicio = parseInt(inicioGuardado);

function verificarTiempo() {
  const ahora = Date.now();
  const pasado = ahora - inicio;

  if (pasado > TIEMPO_LIMITE) {

    localStorage.removeItem("inicioQR");

    document.body.innerHTML = `
      <div style="text-align:center; margin-top:50px;">
        <h2>⏰ Sesión expirada</h2>
        <p>Debes escanear nuevamente el QR</p>
      </div>
    `;
    return false;
  }
  return true;
}

if (!verificarTiempo()) {
  throw new Error("QR expirado");
}

// ENVIAR
document.getElementById("form").onsubmit = async (e) => {
  e.preventDefault();

  if (!verificarTiempo()) return;

  const cedula = document.getElementById("cedula").value.trim();

  console.log("CEDULA:", cedula);
  console.log("CODIGO:", codigo);

  const msg = document.getElementById("mensaje");

  msg.className = "";
  msg.classList.remove("show");

  try {

    const res = await fetch("/registro", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        cedula,
        codigoEdificio: codigo
      })
    });

    if (!res.ok) {
      throw new Error("Error servidor");
    }

    const data = await res.json();

    msg.innerText = data.mensaje || "Sin respuesta del servidor";

    if (data.mensaje && data.mensaje.includes("registrada")) {
      msg.classList.add("success");
    } else {
      msg.classList.add("error");
    }

  } catch (error) {

    msg.innerText = "Error de conexión ❌";
    msg.classList.add("error");

  }

  msg.classList.add("show");
};

</script>

</body>
</html>
