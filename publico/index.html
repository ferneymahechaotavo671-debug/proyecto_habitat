<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro QR</title>

<style>

/* RESET */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, Helvetica, sans-serif;
}

/* FONDO */
body {
    background: linear-gradient(135deg, #0f3d2e, #1f7a63, #38b48b);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* CONTENEDOR */
.container {
    background: rgba(255, 255, 255, 0.95);
    padding: 30px;
    border-radius: 20px;
    width: 90%;
    max-width: 420px;
    box-shadow: 0px 10px 30px rgba(0,0,0,0.3);
    text-align: center;
}

/* TITULO */
h1 {
    color: #0f3d2e;
    margin-bottom: 20px;
}

/* FORM */
form {
    display: flex;
    flex-direction: column;
    gap: 15px;
}

/* INPUTS */
input {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #ccc;
    outline: none;
    transition: 0.3s;
}

/* EFECTO */
input:focus {
    border-color: #1f7a63;
    box-shadow: 0 0 8px rgba(31,122,99,0.5);
}

/* BOTÓN */
button {
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(135deg, #1f7a63, #38b48b);
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

/* HOVER */
button:hover {
    transform: scale(1.05);
    background: linear-gradient(135deg, #38b48b, #1f7a63);
}

/* MENSAJE */
#mensaje {
    margin-top: 15px;
    font-weight: bold;
    opacity: 0;
    transition: opacity 0.5s;
}

#mensaje.show {
    opacity: 1;
}

.success {
    color: #1f7a63;
}

.error {
    color: red;
}

/* RESPONSIVE */
@media (max-width: 480px) {
    .container {
        width: 95%;
        padding: 20px;
    }
}

</style>
</head>

<body>

<div class="container">

  <h1 id="edificio">Validando...</h1>

  <form id="form">
    <input type="text" id="cedula" placeholder="Cédula" required>
    <button>Registrar</button>
  </form>

  <p id="mensaje"></p>

</div>

<script>

// QR desde URL
const params = new URLSearchParams(location.search);
let codigo = params.get("edificio");

if (!codigo) {
  document.body.innerHTML = "<h2>Acceso denegado ❌</h2>";
  throw new Error("Sin QR");
}

// NORMALIZAR
codigo = codigo
  .toString()
  .trim()
  .toLowerCase()
  .replace(/\s+/g, "")
  .replace(/\./g, "");

// NOMBRES
const nombres = {
  arcolsa1: "ED. ARCOLSA 1",
  elpunto: "ED. EL PUNTO",
  calle91: "CALLE 91 PH",
  cerrosales: "ED. CERROSALES",
  balconesemaus: "ED. BALCONES DE EMAUS",
  torreverne: "ED. TORRE VERNE",
  sanjake: "ED. SANJAKE",
  plaza94: "ED. PLAZA 94",
  parque86: "ED. PARQUE 86",
  santorini: "ED. SANTORINI",
  in91: "ED. 91 IN",
  iflat63: "ED. IFLAT 63",
  kubik54: "ED. KUBIK 54",
  lagospontevedra: "ED. LAGOS DE PONTEVEDRA",
  vita106: "ED. VITA 106",
  conquistador: "ED. CONQUISTADOR",
  urapanes: "ED. URAPANES",
  callejonparque: "ED. CALLEJON DEL PARQUE",
  toscana: "ED. TOSCANA",
  altosherradura: "ED. ALTOS DE LA HERRADURA"
};

document.getElementById("edificio").innerText =
  nombres[codigo] || "Edificio no válido";

// REGISTRO
document.getElementById("form").onsubmit = async (e) => {
  e.preventDefault();

  const cedula = document.getElementById("cedula").value.trim();
  const mensaje = document.getElementById("mensaje");

  const res = await fetch("/registro", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      cedula,
      codigoEdificio: codigo
    })
  });

  const data = await res.json();

  mensaje.innerText = data.mensaje;
  mensaje.classList.add("show");

  // estilos según respuesta
  if(data.mensaje.includes("✅")){
    mensaje.classList.remove("error");
    mensaje.classList.add("success");
  } else {
    mensaje.classList.remove("success");
    mensaje.classList.add("error");
  }
};

</script>

</body>
</html>
