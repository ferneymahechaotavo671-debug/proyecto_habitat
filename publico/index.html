<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
}

.card {
  background: white;
  color: #111;
  padding: 30px;
  border-radius: 15px;
  width: 320px;
  text-align: center;
  box-shadow: 0 10px 25px rgba(0,0,0,0.4);
}

h2 {
  margin-bottom: 5px;
}

h3 {
  color: #2563eb;
  margin-bottom: 20px;
}

input {
  width: 100%;
  padding: 12px;
  margin-bottom: 15px;
  border: 1px solid #ccc;
  border-radius: 8px;
}

button {
  width: 100%;
  padding: 12px;
  background: #2563eb;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-size: 16px;
}

button:hover {
  background: #1e40af;
}

#msg {
  margin-top: 15px;
  font-weight: bold;
}
</style>

</head>

<body>

<div class="card">

<h2>Registro de Ingreso / Salida</h2>

<h3 id="edificio"></h3>

<form id="form">
  <input type="text" id="cedula" placeholder="Cédula" required>
  <button type="submit">Registrar</button>
</form>

<p id="msg"></p>

</div>

<script>

const params = new URLSearchParams(location.search);
let codigo = params.get("edificio");

if (!codigo) {
  document.body.innerHTML = "<h2>Acceso denegado ❌</h2>";
}

codigo = codigo.trim().toLowerCase();

document.getElementById("edificio").innerText = codigo;

document.getElementById("form").onsubmit = async (e) => {
  e.preventDefault();

  const cedula = document.getElementById("cedula").value.trim();

  const res = await fetch("/registro", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ cedula, codigoEdificio: codigo })
  });

  const data = await res.json();

  document.getElementById("msg").innerText = data.mensaje;
};

</script>

</body>
</html>
