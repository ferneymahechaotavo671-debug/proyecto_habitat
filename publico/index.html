<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro QR</title>

<style>

/* RESET */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, Helvetica, sans-serif;
}

/* FONDO */
body {
    background: linear-gradient(135deg, #0f3d2e, #1f7a63, #38b48b);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* CONTENEDOR */
.container {
    background: rgba(255, 255, 255, 0.95);
    padding: 30px;
    border-radius: 20px;
    width: 90%;
    max-width: 420px;
    box-shadow: 0px 10px 30px rgba(0,0,0,0.3);
    text-align: center;
}

/* LOGO */
.logo {
    width: 120px;
    margin-bottom: 15px;
}

/* TITULO */
h1 {
    color: #0f3d2e;
    margin-bottom: 20px;
}

/* SUBTITULO */
h3 {
    color: #1f7a63;
    margin-bottom: 15px;
}

/* FORM */
form {
    display: flex;
    flex-direction: column;
    gap: 15px;
}

/* INPUT */
input {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #ccc;
    outline: none;
}

input:focus {
    border-color: #1f7a63;
    box-shadow: 0 0 8px rgba(31,122,99,0.5);
}

/* BOTÓN */
button {
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(135deg, #1f7a63, #38b48b);
    color: white;
    cursor: pointer;
}

button:hover {
    transform: scale(1.05);
}

/* MENSAJE */
#mensaje {
    margin-top: 15px;
    font-weight: bold;
    opacity: 0;
    transition: 0.5s;
}

#mensaje.show {
    opacity: 1;
}

.success { color: #1f7a63; }
.error { color: red; }

</style>
</head>

<body>

<div class="container">

  <img src="logo.png" class="logo">

  <h1>Registro de Ingreso / Salida</h1>

  <h3 id="edificio">Validando...</h3>

  <form id="form">
    <input type="text" id="cedula" placeholder="Ingrese su cédula" required>
    <button type="submit">Registrar</button>
  </form>

  <p id="mensaje"></p>

</div>

<script>

// ==============================
// 🔹 OBTENER QR
// ==============================
const params = new URLSearchParams(location.search);
let codigo = params.get("edificio");

if (!codigo) {
  document.body.innerHTML = "<h2>Acceso denegado ❌</h2>";
  throw new Error("Sin QR");
}

// ==============================
// 🔹 NORMALIZAR (IGUAL QUE SERVER)
// ==============================
codigo = codigo
  .toString()
  .trim()
  .toLowerCase()
  .replace(/\s+/g, "")
  .replace(/\./g, "");

// ==============================
// ⏱️ TIEMPO
// ==============================
const TIEMPO_LIMITE = 20 * 60 * 1000;

let inicioGuardado = localStorage.getItem("inicioQR");

if (!inicioGuardado) {
  inicioGuardado = Date.now();
  localStorage.setItem("inicioQR", inicioGuardado);
}

const inicio = parseInt(inicioGuardado);

function verificarTiempo() {
  const ahora = Date.now();
  if ((ahora - inicio) > TIEMPO_LIMITE) {

    localStorage.removeItem("inicioQR");

    document.body.innerHTML = `
      <div style="text-align:center; margin-top:50px;">
        <h2>⏰ Sesión expirada</h2>
        <p>Escanea nuevamente el QR</p>
      </div>
    `;
    return false;
  }
  return true;
}

if (!verificarTiempo()) throw new Error("Expirado");

// ==============================
// 🚀 REGISTRO
// ==============================
document.getElementById("form").onsubmit = async (e) => {
  e.preventDefault();

  if (!verificarTiempo()) return;

  const cedula = document.getElementById("cedula").value.trim();
  const msg = document.getElementById("mensaje");

  msg.className = "";
  msg.classList.remove("show");

  try {

    const res = await fetch("/registro", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        cedula,
        codigoEdificio: codigo
      })
    });

    const data = await res.json();

    msg.innerText = data.mensaje;

    // 🔥 MOSTRAR NOMBRE DEL EDIFICIO
    if (data.edificio) {
      document.getElementById("edificio").innerText = data.edificio;
    }

    if (data.mensaje.includes("registrada")) {
      msg.classList.add("success");
    } else {
      msg.classList.add("error");
    }

  } catch (error) {
    msg.innerText = "Error de conexión ❌";
    msg.classList.add("error");
  }

  msg.classList.add("show");
};

</script>

</body>
</html>
