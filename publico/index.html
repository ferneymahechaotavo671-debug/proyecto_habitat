<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro de Ingreso / Salida</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #1f2937, #111827);
  margin: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  color: #fff;
}

.container {
  background: #ffffff;
  color: #111;
  padding: 30px;
  border-radius: 15px;
  width: 350px;
  text-align: center;
  box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

h2 {
  margin-bottom: 5px;
}

h3 {
  color: #2563eb;
  margin-bottom: 20px;
}

input {
  width: 100%;
  padding: 12px;
  margin-bottom: 15px;
  border: 1px solid #ccc;
  border-radius: 8px;
  font-size: 16px;
}

button {
  width: 100%;
  padding: 12px;
  background: #2563eb;
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #1e40af;
}

#msg {
  margin-top: 15px;
  font-weight: bold;
}
</style>

</head>

<body>

<div class="container">

  <h2>Registro de Ingreso / Salida</h2>

  <h3 id="edificio"></h3>

  <form id="form">
    <input type="text" id="cedula" placeholder="Ingrese su cédula" required>
    <button type="submit">Registrar</button>
  </form>

  <p id="msg"></p>

</div>

<script>

// 📍 Edificios
const nombres = {
  arcolsa1: "ED. ARCOLSA 1",
  elpunto: "ED. EL PUNTO",
  calle91: "CALLE 91 PH",
  cerrosales: "ED. CERROSALES",
  balconesemaus: "ED. BALCONES DE EMAUS",
  torreverne: "ED. TORRE VERNE",
  sanjake: "ED. SANJAKE",
  plaza94: "ED. PLAZA 94",
  parque86: "ED. PARQUE 86",
  santorini: "ED. SANTORINI",
  in91: "ED. 91 IN",
  iflat63: "ED. IFLAT 63",
  kubik54: "ED. KUBIK 54",
  lagospontevedra: "ED. LAGOS DE PONTEVEDRA",
  vita106: "ED. VITA 106",
  conquistador: "ED. CONQUISTADOR",
  urapanes: "ED. URAPANES",
  callejonparque: "ED. CALLEJON DEL PARQUE",
  toscana: "ED. TOSCANA"
};

// 📷 QR
const params = new URLSearchParams(location.search);
let codigo = params.get("edificio");

if (!codigo) {
  document.body.innerHTML = "<h2>Acceso denegado ❌</h2>";
}

codigo = codigo.trim().toLowerCase();

// 🏢 Nombre edificio
document.getElementById("edificio").innerText =
  nombres[codigo] || "Edificio no válido";

// 🚀 enviar
document.getElementById("form").onsubmit = async (e) => {
  e.preventDefault();

  const cedula = document.getElementById("cedula").value.trim();

  try {
    const res = await fetch("/registro", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ cedula, codigoEdificio: codigo })
    });

    const data = await res.json();

    document.getElementById("msg").innerText = data.mensaje;

  } catch (err) {
    document.getElementById("msg").innerText = "Error de conexión";
  }
};

</script>

</body>
</html>
