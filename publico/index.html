<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <img src="logo.png" alt="Logo" class="logo">

  <h1>Registro de Ingreso / Salida</h1>

  <h3 id="nombreEdificio"></h3>

  <form id="registroForm">
    <input type="text" id="cedula" placeholder="Ingrese su cédula" required>
    <button type="submit">Registrar</button>
  </form>

  <p id="mensaje"></p>
</div>

<script>

const form = document.getElementById("registroForm");
const mensaje = document.getElementById("mensaje");

// 📷 Obtener QR
const params = new URLSearchParams(window.location.search);
const codigoEdificio = params.get("edificio");

// 🔐 Bloquear si no viene del QR
if (!codigoEdificio) {
  document.body.innerHTML = "<h2 style='text-align:center;'>Acceso no autorizado ❌</h2>";
}

// 🏢 Mostrar nombre bonito
const nombres = {
  arcolsa1: "ED.ARCOLSA 1",
  elpunto: "ED. EL PUNTO",
  calle91: "CALLE 91 PH"
};

document.getElementById("nombreEdificio").innerText = nombres[codigoEdificio] || "";

// 🚀 Enviar registro
form.addEventListener("submit", async (e) => {
  e.preventDefault();

  const cedula = document.getElementById("cedula").value.trim();

  if (!cedula) {
    mensaje.textContent = "Ingrese la cédula";
    mensaje.className = "show error";
    return;
  }

  try {
    const respuesta = await fetch("/registro", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        cedula,
        codigoEdificio
      })
    });

    const resultado = await respuesta.json();

    mensaje.textContent = resultado.mensaje;
    mensaje.className = "show success";

    form.reset();

  } catch (error) {
    console.error(error);
    mensaje.textContent = "Error de conexión";
    mensaje.className = "show error";
  }
});

</script>

</body>
</html>
