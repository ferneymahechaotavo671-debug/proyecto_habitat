<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Registro</title>
</head>
<body>

<h2>Registro de Ingreso / Salida</h2>

<h3 id="edificio"></h3>

<form id="form">
  <input type="text" id="cedula" placeholder="Cédula" required>
  <button>Registrar</button>
</form>

<p id="msg"></p>

<script>

// 📍 MAPA DE EDIFICIOS
const nombres = {
  arcolsa1: "ED. ARCOLSA 1",
  elpunto: "ED. EL PUNTO",
  calle91: "CALLE 91 PH",
  cerrosales: "ED. CERROSALES",
  balconesemaus: "ED. BALCONES DE EMAUS",
  torreverne: "ED. TORRE VERNE",
  sanjake: "ED. SANJAKE",
  plaza94: "ED. PLAZA 94",
  parque86: "ED. PARQUE 86",
  santorini: "ED. SANTORINI",
  in91: "ED. 91 IN",
  iflat63: "ED. IFLAT 63",
  kubik54: "ED. KUBIK 54",
  lagospontevedra: "ED. LAGOS DE PONTEVEDRA",
  vita106: "ED. VITA 106",
  conquistador: "ED. CONQUISTADOR",
  urapanes: "ED. URAPANES",
  callejonparque: "ED. CALLEJON DEL PARQUE",
  toscana: "ED. TOSCANA"
};

// 📷 OBTENER QR
const params = new URLSearchParams(location.search);
let codigo = params.get("edificio");

// 🔐 VALIDACIÓN QR
if (!codigo) {
  document.body.innerHTML = "<h2>Acceso denegado ❌</h2>";
}

codigo = codigo.trim().toLowerCase();

// 🏢 MOSTRAR NOMBRE REAL
document.getElementById("edificio").innerText =
  nombres[codigo] || "Edificio no válido";

// 🚀 ENVIAR REGISTRO
document.getElementById("form").onsubmit = async (e) => {
  e.preventDefault();

  const cedula = document.getElementById("cedula").value.trim();

  if (!cedula) {
    document.getElementById("msg").innerText = "Ingrese la cédula";
    return;
  }

  try {
    const res = await fetch("/registro", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({
        cedula,
        codigoEdificio: codigo
      })
    });

    const data = await res.json();

    document.getElementById("msg").innerText = data.mensaje;

    document.getElementById("form").reset();

  } catch (err) {
    document.getElementById("msg").innerText = "Error de conexión";
  }
};

</script>

</body>
</html>
