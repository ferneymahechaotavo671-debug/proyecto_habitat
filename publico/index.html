<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro de Acceso</title>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg,#1e3c72,#2a5298);
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.container{
  background:white;
  padding:30px;
  border-radius:15px;
  width:320px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

h2{
  margin-bottom:5px;
  color:#2c3e50;
}

h3{
  color:#555;
  font-size:16px;
  margin-bottom:20px;
}

input{
  width:100%;
  padding:10px;
  margin:10px 0;
  border:1px solid #ccc;
  border-radius:8px;
}

button{
  width:100%;
  padding:10px;
  background:#2a5298;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

button:hover{
  background:#1e3c72;
}

#msg{
  margin-top:10px;
  font-weight:bold;
}

.error{color:red;}
.success{color:green;}
</style>

</head>

<body>

<div class="container">

<h2>Registro de Acceso</h2>

<h3 id="edificio">Cargando...</h3>

<form id="form">
  <input type="text" id="cedula" placeholder="Ingrese su cédula" required>
  <button>Registrar</button>
</form>

<p id="msg"></p>

</div>

<script>

// 📍 EDIFICIOS
const nombres = {
  arcolsa1: "ED. ARCOLSA 1",
  elpunto: "ED. EL PUNTO",
  calle91: "CALLE 91 PH",
  cerrosales: "ED. CERROSALES",
  balconesemaus: "ED. BALCONES DE EMAUS",
  torreverne: "ED. TORRE VERNE",
  sanjake: "ED. SANJAKE",
  plaza94: "ED. PLAZA 94",
  parque86: "ED. PARQUE 86",
  santorini: "ED. SANTORINI",
  in91: "ED. 91 IN",
  iflat63: "ED. IFLAT 63",
  kubik54: "ED. KUBIK 54",
  lagospontevedra: "ED. LAGOS DE PONTEVEDRA",
  vita106: "ED. VITA 106",
  conquistador: "ED. CONQUISTADOR",
  urapanes: "ED. URAPANES",
  callejonparque: "ED. CALLEJON DEL PARQUE",
  toscana: "ED. TOSCANA"
};

// 📷 QR
const params = new URLSearchParams(location.search);
let codigo = params.get("edificio");

if(!codigo){
  document.body.innerHTML = "<h2 style='color:white;'>Acceso denegado ❌</h2>";
}

codigo = codigo.trim().toLowerCase();

// 🏢 nombre edificio
document.getElementById("edificio").innerText =
  nombres[codigo] || "Edificio no válido";

// 🚀 registro
document.getElementById("form").onsubmit = async (e) => {
  e.preventDefault();

  const cedula = document.getElementById("cedula").value.trim();
  const msg = document.getElementById("msg");

  const res = await fetch("/registro", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({ cedula, codigoEdificio: codigo })
  });

  const data = await res.json();

  msg.innerText = data.mensaje;
  msg.className = "success";

  document.getElementById("form").reset();
};

</script>

</body>
</html>
