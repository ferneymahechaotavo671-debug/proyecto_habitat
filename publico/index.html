<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro QR</title>

<style>
body {
  background: linear-gradient(135deg, #0f3d2e, #1f7a63, #38b48b);
  font-family: Arial;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  background: white;
  padding: 25px;
  border-radius: 15px;
  width: 90%;
  max-width: 400px;
  text-align: center;
}

input, button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
}

button {
  background: #1f7a63;
  color: white;
  border: none;
  cursor: pointer;
}

#msg {
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">

  <h2 id="edificio">Validando...</h2>

  <form id="form">
    <input type="text" id="cedula" placeholder="Cédula" required>
    <button>Registrar</button>
  </form>

  <p id="msg"></p>
</div>

<script>

// QR desde URL
const params = new URLSearchParams(location.search);
let codigo = params.get("edificio");

if (!codigo) {
  document.body.innerHTML = "<h2>Acceso denegado ❌</h2>";
  throw new Error("Sin QR");
}

// NORMALIZAR
codigo = codigo
  .toString()
  .trim()
  .toLowerCase()
  .replace(/\s+/g, "")
  .replace(/\./g, "");

// NOMBRES
const nombres = {
  arcolsa1: "ED. ARCOLSA 1",
  elpunto: "ED. EL PUNTO",
  calle91: "CALLE 91 PH",
  cerrosales: "ED. CERROSALES",
  balconesemaus: "ED. BALCONES DE EMAUS",
  torreverne: "ED. TORRE VERNE",
  sanjake: "ED. SANJAKE",
  plaza94: "ED. PLAZA 94",
  parque86: "ED. PARQUE 86",
  santorini: "ED. SANTORINI",
  in91: "ED. 91 IN",
  iflat63: "ED. IFLAT 63",
  kubik54: "ED. KUBIK 54",
  lagospontevedra: "ED. LAGOS DE PONTEVEDRA",
  vita106: "ED. VITA 106",
  conquistador: "ED. CONQUISTADOR",
  urapanes: "ED. URAPANES",
  callejonparque: "ED. CALLEJON DEL PARQUE",
  toscana: "ED. TOSCANA",
  altosherradura: "ED. ALTOS DE LA HERRADURA"
};

document.getElementById("edificio").innerText =
  nombres[codigo] || "Edificio no válido";

document.getElementById("form").onsubmit = async (e) => {
  e.preventDefault();

  const cedula = document.getElementById("cedula").value.trim();
  const msg = document.getElementById("msg");

  const res = await fetch("/registro", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      cedula,
      codigoEdificio: codigo
    })
  });

  const data = await res.json();

  msg.innerText = data.mensaje;
};

</script>

</body>
</html>
