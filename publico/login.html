<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Login Admin</title>

<style>
body {
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  background:#1f7a63;
  font-family:Arial;
}

.box {
  background:white;
  padding:30px;
  border-radius:15px;
  text-align:center;
}

input {
  padding:10px;
  width:200px;
  margin:10px 0;
}

button {
  padding:10px;
  width:100%;
  background:#1f7a63;
  color:white;
  border:none;
}
</style>
</head>

<body>

<div class="box">
<h2>🔐 Admin</h2>

<input type="password" id="pass" placeholder="Contraseña">

<button onclick="login()">Ingresar</button>

<p id="msg"></p>
</div>

<script>
async function login(){

  const password = document.getElementById("pass").value;

  const res = await fetch("/login", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ password })
  });

  const data = await res.json();

  if(data.ok){
    localStorage.setItem("auth", password);
    location.href = "/admin.html";
  } else {
    document.getElementById("msg").innerText = "❌ Contraseña incorrecta";
  }
}
</script>

</body>
</html>
